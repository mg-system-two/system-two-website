<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <!-- Parchment circle -->
  <circle cx="50" cy="50" r="50" fill="#E1CFA9"/>
  <!-- S2 mark, clipped to circle -->
  <g clip-path="url(#circle)">
    <text
      x="6" y="88"
      font-family="'Times New Roman', Georgia, serif"
      font-weight="bold"
      font-size="88"
      fill="#662F26">S</text>
    <text
      x="52" y="100"
      font-family="'Times New Roman', Georgia, serif"
      font-weight="bold"
      font-size="66"
      fill="#000000">2</text>
  </g>
</svg>
