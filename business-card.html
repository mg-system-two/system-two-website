<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Two — Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Cormorant+SC:wght@300&display=swap" rel="stylesheet">
  <style>
    /* ─── Page (preview wrapper) ─────────────────────────── */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #d6cebc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    }

    /* ─── Card ───────────────────────────────────────────── */
    /* Standard business card: 85mm × 55mm → at 96dpi = 323 × 209px
       Scale ×2.5 for comfortable screen preview: 807 × 522px              */

    .card {
      width: 807px;
      height: 522px;
      background: #f5f1e8;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 64px 48px;
    }

    /* Subtle texture overlay */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 30%, rgba(201,169,110,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ─── Top: logomark ──────────────────────────────────── */

    .card-top {
      display: flex;
      align-items: flex-start;
    }

    .card-logo {
      height: 72px;
      width: auto;
      display: block;
    }

    /* ─── Bottom: contact block ──────────────────────────── */

    .card-bottom {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      color: #6b2735;
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .card-rule {
      width: 40px;
      height: 1px;
      background: rgba(107, 39, 53, 0.35);
      margin-bottom: 12px;
    }

    .card-contact {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card-contact-item {
      font-family: 'Cormorant SC', Georgia, serif;
      font-size: 11.5px;
      font-weight: 300;
      letter-spacing: 0.16em;
      color: #2f5233;
    }

    /* ─── Save button ────────────────────────────────────── */

    .save-btn {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #6b2735;
      color: #f5f1e8;
      border: none;
      padding: 0.65rem 1.75rem;
      font-family: 'Cormorant SC', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      cursor: pointer;
      z-index: 10;
    }

    .save-btn:hover {
      background: #2f5233;
    }

    /* ─── Print ───────────────────────────────────────────── */

    @media print {
      @page {
        size: 85mm 55mm;
        margin: 0;
      }

      body {
        background: none;
        display: block;
        min-height: unset;
      }

      .save-btn {
        display: none;
      }

      .card {
        width: 85mm;
        height: 55mm;
        padding: 10mm 12mm 9mm;
      }

      .card-logo {
        height: 14mm;
      }

      .card-name {
        font-size: 5.6mm;
        margin-bottom: 1.9mm;
      }

      .card-rule {
        width: 7.5mm;
        margin-bottom: 2.3mm;
      }

      .card-contact-item {
        font-size: 2.15mm;
      }

      .card-side-rule {
        right: 10.5mm;
        top: 10mm;
        bottom: 9mm;
      }
    }

    /* ─── Decorative right-edge rule ─────────────────────── */

    .card-side-rule {
      position: absolute;
      right: 56px;
      top: 52px;
      bottom: 48px;
      width: 1px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(107, 39, 53, 0.2) 20%,
        rgba(107, 39, 53, 0.2) 80%,
        transparent
      );
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-side-rule"></div>

    <div class="card-top">
      <img class="card-logo" src="images/system2-logomark.png" alt="System Two" />
    </div>

    <div class="card-bottom">
      <div class="card-name">Your Name</div>
      <div class="card-rule"></div>
      <div class="card-contact">
        <span class="card-contact-item">mg@system-two.org</span>
        <span class="card-contact-item">+44 7700 000000</span>
      </div>
    </div>
  </div>

  <button class="save-btn" onclick="window.print()">Save as PDF</button>

</body>
</html>
