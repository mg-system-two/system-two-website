<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Two</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="hero-page">

  <div class="hero-wrapper">

    <!-- Faint watermark numeral -->
    <div class="hero-watermark" aria-hidden="true">2</div>

    <!-- Top-left brand label -->
    <div class="hero-brand">System Two</div>

    <!-- Logo lockup: Dürer S + wordmark -->
    <main class="hero-main">
      <div class="hero-lockup">
        <img class="logo-s-img" src="s2_circinus_illuminates/S_s2_circinus_illuminates.png" alt="S" />
        <div class="logo-wordmark">ystem Two</div>
      </div>
    </main>

    <!-- Accent rule -->
    <div class="hero-rule"></div>

    <!-- Tagline -->
    <div class="hero-lower">
      <p class="hero-tagline">Delivering Innovation Capability</p>
    </div>

    <!-- Footer -->
    <footer class="hero-footer">
      <span>2026 &middot; system-two.org</span>
    </footer>

  </div>

</body>
</html>
